<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0F1117" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="MedNote" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="manifest" href="manifest.json" />
<title>MedNote</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0F1117;
    --bg-elev: #171A22;
    --bg-input: #1E222C;
    --border: #2A2F3A;
    --accent: #4ECDC4;
    --accent-dim: #2f8f88;
    --warn: #F0883E;
    --text: #E6E9EF;
    --text-dim: #8A92A6;
    --radius: 14px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); }
  body {
    font-family: 'Inter', system-ui, -apple-system, 'Noto Sans TC', sans-serif;
    line-height: 1.5;
    min-height: 100vh;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

  /* Header */
  header {
    position: sticky; top: 0; z-index: 20;
    display: flex; align-items: center; justify-content: space-between;
    padding: calc(env(safe-area-inset-top) + 14px) 18px 14px;
    background: rgba(15,17,23,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  header .brand { display: flex; align-items: center; gap: 9px; font-weight: 700; font-size: 19px; letter-spacing: .3px; }
  header .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px var(--accent); }
  .icon-btn {
    background: var(--bg-input); border: 1px solid var(--border); color: var(--text-dim);
    width: 40px; height: 40px; border-radius: 11px; font-size: 17px;
    display: grid; place-items: center; cursor: pointer; transition: .15s;
  }
  .icon-btn:active { transform: scale(.94); color: var(--accent); }

  main { padding: 18px; max-width: 640px; margin: 0 auto; }

  .section-label { font-size: 12.5px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin: 22px 4px 10px; }
  .section-label:first-child { margin-top: 4px; }

  /* Category chips */
  .cats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .cat {
    display: flex; align-items: center; gap: 10px;
    padding: 13px 14px; border-radius: var(--radius);
    background: var(--bg-elev); border: 1px solid var(--border);
    cursor: pointer; transition: .15s; font-weight: 500; font-size: 15px;
  }
  .cat .radio { width: 17px; height: 17px; border-radius: 50%; border: 2px solid var(--text-dim); flex: 0 0 auto; transition: .15s; }
  .cat.active { border-color: var(--accent); background: rgba(78,205,196,0.08); color: var(--accent); }
  .cat.active .radio { border-color: var(--accent); background: var(--accent); box-shadow: inset 0 0 0 3px var(--bg-elev); }
  .cat:active { transform: scale(.98); }

  /* Inputs */
  input[type=text], textarea {
    width: 100%; background: var(--bg-input); border: 1px solid var(--border);
    color: var(--text); border-radius: var(--radius); padding: 13px 14px;
    font-family: inherit; font-size: 15px; outline: none; transition: border-color .15s;
    resize: vertical;
  }
  input[type=text]:focus, textarea:focus { border-color: var(--accent-dim); }
  textarea { min-height: 150px; line-height: 1.6; }
  textarea.result-area { font-family: 'JetBrains Mono', monospace; font-size: 13.5px; min-height: 180px; }

  .row-btns { display: flex; gap: 8px; margin-top: 9px; }
  .mini-btn {
    flex: 1; background: var(--bg-elev); border: 1px solid var(--border); color: var(--text-dim);
    padding: 10px; border-radius: 11px; font-size: 13.5px; font-weight: 500; cursor: pointer; transition: .15s;
    font-family: inherit;
  }
  .mini-btn:active { transform: scale(.97); color: var(--accent); border-color: var(--accent-dim); }

  /* Signature status line */
  .status-wrap { margin: 26px 0 16px; }
  .status-line {
    height: 3px; border-radius: 3px; background: var(--border); overflow: hidden; position: relative;
  }
  .status-line.idle { background: var(--border); }
  .status-line.busy::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    background-size: 50% 100%; background-repeat: no-repeat;
    animation: flow 1.1s linear infinite;
  }
  .status-line.done { background: var(--accent); box-shadow: 0 0 12px rgba(78,205,196,.5); }
  .status-line.error { background: var(--warn); box-shadow: 0 0 12px rgba(240,136,62,.5); }
  @keyframes flow { from { background-position: -50% 0; } to { background-position: 150% 0; } }
  .status-text { text-align: center; font-size: 12.5px; color: var(--text-dim); margin-top: 9px; min-height: 16px; }
  .status-text.error { color: var(--warn); }

  /* Primary button */
  .submit {
    width: 100%; padding: 16px; border: none; border-radius: var(--radius);
    background: var(--accent); color: #06201E; font-weight: 700; font-size: 16px;
    cursor: pointer; transition: .15s; font-family: inherit; letter-spacing: .3px;
  }
  .submit:active { transform: scale(.98); }
  .submit:disabled { opacity: .5; cursor: not-allowed; }

  /* Result block */
  .result-block {
    margin-top: 8px; overflow: hidden; max-height: 0; opacity: 0;
    transition: max-height .4s ease, opacity .3s ease, margin .3s;
  }
  .result-block.open { max-height: 1200px; opacity: 1; margin-top: 26px; }
  .result-card { background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .badge-raw { display: inline-block; font-size: 11.5px; color: var(--warn); border: 1px solid var(--warn); border-radius: 6px; padding: 2px 7px; margin-bottom: 10px; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(5,6,9,.7); backdrop-filter: blur(4px);
    display: none; align-items: flex-end; z-index: 50;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg-elev); border: 1px solid var(--border); border-bottom: none;
    border-radius: 20px 20px 0 0; width: 100%; max-width: 640px; margin: 0 auto;
    padding: 22px 20px calc(env(safe-area-inset-bottom) + 22px);
    animation: slideUp .25s ease;
  }
  @keyframes slideUp { from { transform: translateY(40px); opacity: .6; } to { transform: translateY(0); opacity: 1; } }
  .modal h2 { margin: 0 0 4px; font-size: 18px; }
  .modal .hint { color: var(--text-dim); font-size: 13px; margin: 0 0 18px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 6px; font-weight: 500; }
  select { width: 100%; background: var(--bg-input); border: 1px solid var(--border); color: var(--text); border-radius: 11px; padding: 12px 14px; font-size: 15px; font-family: inherit; }

  /* Toast */
  .toast {
    position: fixed; left: 50%; bottom: calc(env(safe-area-inset-bottom) + 28px); transform: translateX(-50%) translateY(20px);
    background: var(--accent); color: #06201E; font-weight: 600; font-size: 14px;
    padding: 12px 22px; border-radius: 30px; opacity: 0; pointer-events: none; transition: .3s; z-index: 80;
    box-shadow: 0 8px 24px rgba(0,0,0,.4);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
  <header>
    <div class="brand"><span class="dot"></span> MedNote</div>
    <button class="icon-btn" id="btnSettings" title="設定">⚙</button>
  </header>

  <main>
    <div class="section-label">分類選擇</div>
    <div class="cats" id="cats">
      <div style="color:var(--text-dim);font-size:14px;grid-column:1/-1;padding:8px 4px;">載入分類中…</div>
    </div>

    <div class="section-label">標題（選填）</div>
    <input type="text" id="title" placeholder="例如：2026-06-10 早查房" />

    <div class="section-label">原始文字</div>
    <textarea id="rawText" placeholder="貼上或輸入已轉錄的文字…"></textarea>
    <div class="row-btns">
      <button class="mini-btn" id="btnPaste">📋 貼上</button>
      <button class="mini-btn" id="btnClear">🗑 清除</button>
    </div>

    <div class="section-label">標籤（選填，空格分隔）</div>
    <input type="text" id="tags" placeholder="例如：急診 透析" />

    <div class="status-wrap">
      <div class="status-line idle" id="statusLine"></div>
      <div class="status-text" id="statusText"></div>
    </div>

    <button class="submit" id="btnSubmit">送出並整理</button>

    <!-- 整理結果區 -->
    <div class="result-block" id="resultBlock">
      <div class="section-label" style="margin-top:0;">整理結果</div>
      <div class="result-card">
        <span class="badge-raw" id="rawBadge" style="display:none;">⚠ AI 整理失敗，以下為原始文字</span>
        <textarea class="result-area mono" id="resultText"></textarea>
        <div class="row-btns">
          <button class="mini-btn" id="btnCopy">📋 複製</button>
          <button class="mini-btn" id="btnConfirm" style="color:var(--accent);border-color:var(--accent-dim);">✓ 確認儲存</button>
        </div>
      </div>
    </div>
  </main>

  <!-- 設定 Modal -->
  <div class="modal-overlay" id="settingsModal">
    <div class="modal">
      <h2>設定</h2>
      <p class="hint">所有設定僅儲存在本機（localStorage），不會上傳。</p>
      <div class="field">
        <label>GAS Endpoint URL</label>
        <input type="text" id="setUrl" placeholder="https://script.google.com/macros/s/.../exec" />
      </div>
      <div class="field">
        <label>APP Token</label>
        <input type="text" id="setToken" placeholder="與 GAS 端 APP_TOKEN 相同的字串" />
      </div>
      <div class="field">
        <label>AI Provider</label>
        <select id="setProvider">
          <option value="gemini">Gemini</option>
          <option value="claude">Claude</option>
        </select>
      </div>
      <div class="field">
        <label>Model</label>
        <input type="text" id="setModel" placeholder="gemini-2.0-flash-lite" />
      </div>
      <p class="hint" style="margin-top:-6px;">提示：API Provider 與 Model 實際以 GAS 端的 Script Properties 為準；此處僅作備忘記錄。</p>
      <button class="submit" id="btnSaveSettings">儲存設定</button>
    </div>
  </div>

  <div class="toast" id="toast">✓ 已儲存</div>

<script>
(function () {
  'use strict';

  // ---- localStorage keys ----
  const LS = {
    url: 'mednote_gas_url',
    token: 'mednote_token',
    provider: 'mednote_ai_provider',
    apiKey: 'mednote_api_key',      // 保留 key 名稱（相容規格），實際 Key 存於 GAS 端
    model: 'mednote_model'
  };

  // ---- State ----
  let categories = [];
  let selectedCat = null;
  let lastResult = null; // { id, processed_text, status }
  let busy = false;

  // ---- Elements ----
  const $ = (id) => document.getElementById(id);
  const catsEl = $('cats');
  const statusLine = $('statusLine');
  const statusText = $('statusText');
  const resultBlock = $('resultBlock');
  const resultText = $('resultText');
  const rawBadge = $('rawBadge');

  // ===========================================================
  // Settings
  // ===========================================================
  function getCfg() {
    return {
      url: localStorage.getItem(LS.url) || '',
      token: localStorage.getItem(LS.token) || '',
      provider: localStorage.getItem(LS.provider) || 'gemini',
      model: localStorage.getItem(LS.model) || 'gemini-2.0-flash-lite'
    };
  }
  function openSettings() {
    const c = getCfg();
    $('setUrl').value = c.url;
    $('setToken').value = c.token;
    $('setProvider').value = c.provider;
    $('setModel').value = c.model;
    $('settingsModal').classList.add('open');
  }
  function closeSettings() { $('settingsModal').classList.remove('open'); }
  function saveSettings() {
    localStorage.setItem(LS.url, $('setUrl').value.trim());
    localStorage.setItem(LS.token, $('setToken').value.trim());
    localStorage.setItem(LS.provider, $('setProvider').value);
    localStorage.setItem(LS.model, $('setModel').value.trim());
    closeSettings();
    showToast('✓ 設定已儲存');
    loadCategories();
  }

  // ===========================================================
  // Status line
  // ===========================================================
  function setStatus(state, text) {
    statusLine.className = 'status-line ' + state;
    statusText.textContent = text || '';
    statusText.className = 'status-text' + (state === 'error' ? ' error' : '');
  }

  // ===========================================================
  // Categories (dynamic from GAS)
  // ===========================================================
  async function loadCategories() {
    const c = getCfg();
    if (!c.url) { catsEl.innerHTML = '<div style="color:var(--text-dim);font-size:14px;grid-column:1/-1;padding:8px 4px;">請先在設定中填入 GAS URL。</div>'; return; }
    try {
      const data = await apiGet({ action: 'categories' });
      if (!data.success) throw new Error(data.error || '讀取分類失敗');
      categories = data.categories || [];
      renderCategories();
    } catch (err) {
      catsEl.innerHTML = '<div style="color:var(--warn);font-size:14px;grid-column:1/-1;padding:8px 4px;">分類載入失敗：' + escapeHtml(String(err.message || err)) + '</div>';
    }
  }
  function renderCategories() {
    catsEl.innerHTML = '';
    categories.forEach((cat) => {
      const el = document.createElement('div');
      el.className = 'cat' + (cat.key === selectedCat ? ' active' : '');
      el.innerHTML = '<span class="radio"></span><span>' + escapeHtml(cat.label) + '</span>';
      el.addEventListener('click', () => {
        selectedCat = cat.key;
        renderCategories();
      });
      catsEl.appendChild(el);
    });
  }

  // ===========================================================
  // API helpers (CORS-safe: GET simple request; POST text/plain)
  // ===========================================================
  function apiGet(params) {
    const c = getCfg();
    const url = new URL(c.url);
    params.token = c.token;
    Object.keys(params).forEach((k) => url.searchParams.set(k, params[k]));
    return fetch(url.toString(), { method: 'GET' }).then((r) => r.json());
  }
  function apiPost(payload) {
    const c = getCfg();
    payload.token = c.token;
    return fetch(c.url, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // 避免 CORS preflight
      body: JSON.stringify(payload)
    }).then((r) => r.json());
  }

  // ===========================================================
  // Submit
  // ===========================================================
  async function submit() {
    if (busy) return;
    const c = getCfg();
    if (!c.url) { openSettings(); return; }
    if (!selectedCat) { setStatus('error', '請先選擇分類'); return; }
    const raw = $('rawText').value.trim();
    if (!raw) { setStatus('error', '原始文字不可空白'); return; }

    busy = true;
    $('btnSubmit').disabled = true;
    resultBlock.classList.remove('open');
    setStatus('busy', 'AI 整理中…');

    const tags = $('tags').value.trim().split(/\s+/).filter(Boolean);

    try {
      const data = await apiPost({
        action: 'submit',
        category: selectedCat,
        title: $('title').value.trim(),
        raw_text: raw,
        tags: tags
      });
      if (!data.success) throw new Error(data.error || '整理失敗');

      lastResult = data;
      resultText.value = data.processed_text || '';
      rawBadge.style.display = (data.status === 'raw') ? 'inline-block' : 'none';
      resultBlock.classList.add('open');
      resultBlock.scrollIntoView({ behavior: 'smooth', block: 'start' });

      if (data.status === 'raw') setStatus('error', '已儲存，但 AI 整理失敗（保留原始文字）');
      else setStatus('done', '✓ 整理完成並已儲存');
    } catch (err) {
      setStatus('error', '錯誤：' + (err.message || err));
    } finally {
      busy = false;
      $('btnSubmit').disabled = false;
    }
  }

  // ===========================================================
  // Confirm save (persist any edits to the processed text)
  // ===========================================================
  async function confirmSave() {
    if (!lastResult || !lastResult.id) { resetForm(); return; }
    const edited = resultText.value;
    try {
      if (edited !== (lastResult.processed_text || '')) {
        const data = await apiPost({ action: 'update', id: lastResult.id, processed_text: edited });
        if (!data.success) throw new Error(data.error || '更新失敗');
      }
      resetForm();
      showToast('✓ 已儲存');
    } catch (err) {
      setStatus('error', '儲存編輯失敗：' + (err.message || err));
    }
  }

  function resetForm() {
    $('title').value = '';
    $('rawText').value = '';
    $('tags').value = '';
    selectedCat = null;
    renderCategories();
    resultBlock.classList.remove('open');
    setStatus('idle', '');
    lastResult = null;
  }

  // ===========================================================
  // Misc helpers
  // ===========================================================
  function showToast(msg) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => t.classList.remove('show'), 3000);
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
  }
  async function pasteFromClipboard() {
    try {
      const txt = await navigator.clipboard.readText();
      const el = $('rawText');
      el.value = (el.value ? el.value + '\n' : '') + txt;
    } catch (e) {
      setStatus('error', '無法讀取剪貼簿，請手動貼上（長按輸入框）');
    }
  }
  async function copyResult() {
    try { await navigator.clipboard.writeText(resultText.value); showToast('✓ 已複製'); }
    catch (e) { setStatus('error', '複製失敗，請手動選取'); }
  }

  // ===========================================================
  // Wire up
  // ===========================================================
  $('btnSettings').addEventListener('click', openSettings);
  $('settingsModal').addEventListener('click', (e) => { if (e.target.id === 'settingsModal') closeSettings(); });
  $('btnSaveSettings').addEventListener('click', saveSettings);
  $('btnSubmit').addEventListener('click', submit);
  $('btnConfirm').addEventListener('click', confirmSave);
  $('btnCopy').addEventListener('click', copyResult);
  $('btnPaste').addEventListener('click', pasteFromClipboard);
  $('btnClear').addEventListener('click', () => { $('rawText').value = ''; });

  // 首次開啟若無 GAS URL → 自動開啟設定
  if (!getCfg().url) openSettings();
  loadCategories();
})();
</script>
</body>
</html>
