<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#0F1117" />
<title>MedNote</title>
<link rel="apple-touch-icon" href="pwa/icon-192.png" />
<link rel="icon" href="pwa/icon-192.png" />
<meta name="robots" content="noindex, nofollow" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0F1117;
    --bg-elev: #171A22;
    --border: #2A2F3A;
    --accent: #4ECDC4;
    --text: #E6E9EF;
    --text-dim: #8A92A6;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100vh; background: var(--bg); color: var(--text); }
  body {
    font-family: 'Inter', system-ui, 'Noto Sans TC', sans-serif;
    display: grid; place-items: center; padding: 24px;
  }
  .card { max-width: 460px; width: 100%; text-align: center; }
  .brand { display: inline-flex; align-items: center; gap: 12px; font-weight: 700; font-size: 26px; margin-bottom: 6px; }
  .dot { width: 11px; height: 11px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 14px var(--accent); }
  p.sub { color: var(--text-dim); margin: 0 0 28px; font-size: 14.5px; }
  .grid { display: grid; gap: 14px; }
  a.tile {
    display: block; background: var(--bg-elev); border: 1px solid var(--border);
    border-radius: 16px; padding: 22px 22px; text-decoration: none; color: var(--text);
    transition: .15s; text-align: left;
  }
  a.tile:hover { border-color: var(--accent); transform: translateY(-1px); }
  a.tile .icon { font-size: 28px; line-height: 1; margin-bottom: 10px; }
  a.tile .title { font-weight: 600; font-size: 17px; }
  a.tile .desc { color: var(--text-dim); font-size: 13px; margin-top: 4px; }
  footer { color: var(--text-dim); font-size: 12px; margin-top: 28px; }
</style>
</head>
<body>
  <div class="card">
    <div class="brand"><span class="dot"></span>MedNote</div>
    <p class="sub">醫療語音紀錄整理系統</p>
    <div class="grid">
      <a class="tile" href="pwa/">
        <div class="icon">📱</div>
        <div class="title">手機端</div>
        <div class="desc">輸入轉錄文字、AI 整理、儲存(可加到主畫面)</div>
      </a>
      <a class="tile" href="dashboard/">
        <div class="icon">🖥</div>
        <div class="title">桌面查詢</div>
        <div class="desc">瀏覽 / 搜尋已儲存的紀錄與待辦</div>
      </a>
    </div>
    <footer>內網限定 · 同 WiFi 才能存取</footer>
  </div>
</body>
</html>
