<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MedNote Dashboard</title>
<meta name="robots" content="noindex, nofollow" />
<meta name="theme-color" content="#0F1117" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="../pwa/icon-192.png" />
<link rel="apple-touch-icon" href="../pwa/icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0F1117;
    --bg-elev: #171A22;
    --bg-input: #1E222C;
    --border: #2A2F3A;
    --accent: #4ECDC4;
    --accent-dim: #2f8f88;
    --warn: #F0883E;
    --text: #E6E9EF;
    --text-dim: #8A92A6;
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text); }
  body { font-family: 'Inter', system-ui, 'Noto Sans TC', sans-serif; line-height: 1.5; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

  .layout { display: grid; grid-template-columns: 280px 1fr; height: 100vh; }

  /* Sidebar */
  aside {
    background: var(--bg-elev); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow-y: auto;
  }
  .side-head { padding: 22px 20px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .brand { font-weight: 700; font-size: 18px; display: flex; align-items: center; gap: 9px; }
  .brand small { display: block; font-size: 11px; color: var(--text-dim); font-weight: 500; letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px var(--accent); }
  .icon-btn { background: var(--bg-input); border: 1px solid var(--border); color: var(--text-dim); width: 36px; height: 36px; border-radius: 10px; cursor: pointer; font-size: 15px; transition: .15s; }
  .icon-btn:hover { color: var(--accent); border-color: var(--accent-dim); }

  .side-section { padding: 16px 20px; }
  .side-label { font-size: 11.5px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
  .filter { display: flex; align-items: center; gap: 10px; padding: 9px 11px; border-radius: 10px; cursor: pointer; font-size: 14.5px; transition: .12s; user-select: none; }
  .filter:hover { background: var(--bg-input); }
  .filter.active { background: rgba(78,205,196,0.1); color: var(--accent); }
  .filter .box { width: 16px; height: 16px; border-radius: 5px; border: 2px solid var(--text-dim); flex: 0 0 auto; display: grid; place-items: center; font-size: 11px; transition: .12s; }
  .filter.active .box { border-color: var(--accent); background: var(--accent); color: #06201E; }

  .divider { height: 1px; background: var(--border); margin: 4px 20px; }

  /* Todos */
  .todo-head { display: flex; align-items: center; justify-content: space-between; }
  .todo-count { font-size: 12px; background: var(--accent); color: #06201E; font-weight: 700; padding: 1px 8px; border-radius: 20px; }
  .todo { display: flex; gap: 10px; padding: 10px 11px; border-radius: 10px; font-size: 13.5px; transition: .12s; align-items: flex-start; }
  .todo:hover { background: var(--bg-input); }
  .todo .check { width: 17px; height: 17px; border-radius: 5px; border: 2px solid var(--text-dim); flex: 0 0 auto; cursor: pointer; margin-top: 1px; display: grid; place-items: center; font-size: 11px; transition: .12s; }
  .todo .check:hover { border-color: var(--accent); }
  .todo.done .check { background: var(--accent); border-color: var(--accent); color: #06201E; }
  .todo.done .todo-text { text-decoration: line-through; color: var(--text-dim); }
  .todo-meta { font-size: 11.5px; color: var(--text-dim); margin-top: 2px; }

  /* Main */
  main { overflow-y: auto; }
  .topbar { position: sticky; top: 0; z-index: 10; background: rgba(15,17,23,.9); backdrop-filter: blur(10px); padding: 18px 28px; border-bottom: 1px solid var(--border); }
  .search { position: relative; max-width: 560px; }
  .search input { width: 100%; background: var(--bg-input); border: 1px solid var(--border); color: var(--text); border-radius: 12px; padding: 13px 44px 13px 16px; font-size: 15px; font-family: inherit; outline: none; transition: border-color .15s; }
  .search input:focus { border-color: var(--accent-dim); }
  .search .mag { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 16px; }

  .content { padding: 24px 28px 60px; max-width: 900px; }

  .card { background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 14px; overflow: hidden; transition: border-color .15s; }
  .card:hover { border-color: var(--accent-dim); }
  .card-head { padding: 16px 18px; cursor: pointer; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .card-title { font-weight: 600; font-size: 16px; margin: 0 0 5px; }
  .card-sub { font-size: 12.5px; color: var(--text-dim); }
  .pill { display: inline-block; font-size: 11px; padding: 2px 9px; border-radius: 20px; background: var(--bg-input); border: 1px solid var(--border); color: var(--accent); margin-right: 6px; }
  .pill.raw { color: var(--warn); border-color: var(--warn); }
  .chev { color: var(--text-dim); transition: transform .2s; font-size: 13px; margin-top: 4px; }
  .card.open .chev { transform: rotate(90deg); }
  .card-body { max-height: 0; overflow: hidden; transition: max-height .3s ease; }
  .card.open .card-body { max-height: 4000px; }
  .card-body-inner { padding: 0 18px 18px; border-top: 1px solid var(--border); }
  .card-body-inner pre { font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.65; white-space: pre-wrap; word-break: break-word; color: var(--text); margin: 14px 0 0; }
  .tags-row { margin-top: 12px; }
  .tag { display: inline-block; font-size: 11px; color: var(--text-dim); background: var(--bg-input); border-radius: 6px; padding: 2px 8px; margin: 0 6px 6px 0; }

  .load-more { display: block; margin: 8px auto 0; background: var(--bg-elev); border: 1px solid var(--border); color: var(--text-dim); padding: 11px 28px; border-radius: 11px; font-size: 14px; cursor: pointer; font-family: inherit; transition: .15s; }
  .load-more:hover { color: var(--accent); border-color: var(--accent-dim); }
  .empty { text-align: center; color: var(--text-dim); padding: 60px 20px; font-size: 15px; }

  /* Settings modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(5,6,9,.7); backdrop-filter: blur(4px); display: none; place-items: center; z-index: 50; }
  .modal-overlay.open { display: grid; }
  .modal { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 18px; width: 480px; max-width: 92vw; padding: 26px; }
  .modal h2 { margin: 0 0 4px; font-size: 19px; }
  .modal .hint { color: var(--text-dim); font-size: 13px; margin: 0 0 20px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 6px; }
  .field input { width: 100%; background: var(--bg-input); border: 1px solid var(--border); color: var(--text); border-radius: 11px; padding: 12px 14px; font-size: 14px; font-family: inherit; outline: none; }
  .field input:focus { border-color: var(--accent-dim); }
  .btn-primary { width: 100%; padding: 14px; border: none; border-radius: 12px; background: var(--accent); color: #06201E; font-weight: 700; font-size: 15px; cursor: pointer; font-family: inherit; }

  .toast { position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%) translateY(20px); background: var(--accent); color: #06201E; font-weight: 600; font-size: 14px; padding: 12px 22px; border-radius: 30px; opacity: 0; pointer-events: none; transition: .3s; z-index: 80; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <aside>
      <div class="side-head">
        <div class="brand"><span class="dot"></span> <div>MedNote<small>Dashboard</small></div></div>
        <button class="icon-btn" id="btnSettings" title="設定">⚙</button>
      </div>

      <div class="side-section">
        <div class="side-label">分類篩選</div>
        <div id="filters">
          <div class="filter active" data-cat="all"><span class="box">✓</span> 全部</div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="side-section">
        <div class="todo-head">
          <div class="side-label" style="margin-bottom:0;">待辦事項</div>
          <span class="todo-count" id="todoCount">0</span>
        </div>
        <div id="todos" style="margin-top:12px;">
          <div style="color:var(--text-dim);font-size:13px;">尚無待辦。</div>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main>
      <div class="topbar">
        <div class="search">
          <input type="text" id="searchBox" placeholder="搜尋標題、內容、標籤…" />
          <span class="mag">🔍</span>
        </div>
      </div>
      <div class="content">
        <div id="list"></div>
        <button class="load-more" id="btnMore" style="display:none;">載入更多</button>
        <div class="empty" id="emptyState" style="display:none;">沒有符合的紀錄。</div>
      </div>
    </main>
  </div>

  <!-- Settings -->
  <div class="modal-overlay" id="settingsModal">
    <div class="modal">
      <h2>設定</h2>
      <p class="hint">所有設定僅儲存在本機（localStorage），不會上傳。</p>
      <div class="field">
        <label>GAS Endpoint URL</label>
        <input type="text" id="setUrl" placeholder="https://script.google.com/macros/s/.../exec" />
      </div>
      <div class="field">
        <label>APP Token</label>
        <input type="text" id="setToken" placeholder="與 GAS 端 APP_TOKEN 相同的字串" />
      </div>
      <button class="btn-primary" id="btnSaveSettings">儲存設定</button>
    </div>
  </div>

  <div class="toast" id="toast">✓</div>

<script>
(function () {
  'use strict';

  const LS = { url: 'mednote_gas_url', token: 'mednote_token' };
  const PAGE = 20;

  let categories = [];
  let activeCat = 'all';
  let query = '';
  let offset = 0;
  let loadedAll = false;

  const $ = (id) => document.getElementById(id);
  const listEl = $('list');

  function getCfg() {
    return { url: localStorage.getItem(LS.url) || '', token: localStorage.getItem(LS.token) || '' };
  }

  // ---- API (CORS-safe) ----
  function apiGet(params) {
    const c = getCfg();
    const url = new URL(c.url);
    params.token = c.token;
    Object.keys(params).forEach((k) => url.searchParams.set(k, params[k]));
    return fetch(url.toString(), { method: 'GET' }).then((r) => r.json());
  }
  function apiPost(payload) {
    const c = getCfg();
    payload.token = c.token;
    return fetch(c.url, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    }).then((r) => r.json());
  }

  // ---- Settings ----
  function openSettings() {
    const c = getCfg();
    $('setUrl').value = c.url;
    $('setToken').value = c.token;
    $('settingsModal').classList.add('open');
  }
  function saveSettings() {
    localStorage.setItem(LS.url, $('setUrl').value.trim());
    localStorage.setItem(LS.token, $('setToken').value.trim());
    $('settingsModal').classList.remove('open');
    showToast('✓ 設定已儲存');
    init();
  }

  // ---- Categories / filters ----
  async function loadCategories() {
    try {
      const data = await apiGet({ action: 'categories' });
      if (data.success) categories = data.categories || [];
    } catch (e) { categories = []; }
    renderFilters();
  }
  function renderFilters() {
    const wrap = $('filters');
    wrap.innerHTML = '';
    const all = makeFilter('all', '全部');
    wrap.appendChild(all);
    categories.forEach((c) => wrap.appendChild(makeFilter(c.key, c.label)));
  }
  function makeFilter(key, label) {
    const el = document.createElement('div');
    el.className = 'filter' + (key === activeCat ? ' active' : '');
    el.dataset.cat = key;
    el.innerHTML = '<span class="box">' + (key === activeCat ? '✓' : '') + '</span> ' + escapeHtml(label);
    el.addEventListener('click', () => {
      activeCat = key;
      renderFilters();
      reload();
    });
    return el;
  }

  // ---- Records ----
  async function reload() {
    offset = 0;
    loadedAll = false;
    listEl.innerHTML = '';
    await loadMore();
  }
  async function loadMore() {
    const c = getCfg();
    if (!c.url) { $('emptyState').textContent = '請先在右上角設定中填入 GAS URL。'; $('emptyState').style.display = 'block'; return; }
    try {
      const params = { action: 'list', category: activeCat, limit: PAGE, offset: offset };
      if (query) params.q = query;
      const data = await apiGet(params);
      if (!data.success) throw new Error(data.error || '讀取失敗');
      const records = data.records || [];

      records.forEach((r) => listEl.appendChild(renderCard(r)));
      offset += records.length;
      if (records.length < PAGE) loadedAll = true;

      $('btnMore').style.display = loadedAll ? 'none' : 'block';
      $('emptyState').style.display = (offset === 0) ? 'block' : 'none';
      if (offset === 0) $('emptyState').textContent = '沒有符合的紀錄。';
    } catch (err) {
      $('emptyState').textContent = '載入失敗：' + (err.message || err);
      $('emptyState').style.display = 'block';
    }
  }

  function labelFor(key) {
    const c = categories.find((x) => x.key === key);
    return c ? c.label : key;
  }
  function renderCard(r) {
    const card = document.createElement('div');
    card.className = 'card';

    const isRaw = r.status === 'raw';
    const tags = (r.tags || '').split(/\s+/).filter(Boolean);
    const tagsHtml = tags.length
      ? '<div class="tags-row">' + tags.map((t) => '<span class="tag">#' + escapeHtml(t) + '</span>').join('') + '</div>'
      : '';

    card.innerHTML =
      '<div class="card-head">' +
        '<div>' +
          '<div class="card-title">' + escapeHtml(r.title || '(無標題)') + '</div>' +
          '<div class="card-sub">' +
            '<span class="pill' + (isRaw ? ' raw' : '') + '">' + escapeHtml(labelFor(r.category)) + (isRaw ? ' · 未整理' : '') + '</span>' +
            escapeHtml(formatTime(r.timestamp)) +
          '</div>' +
        '</div>' +
        '<span class="chev">▶</span>' +
      '</div>' +
      '<div class="card-body"><div class="card-body-inner">' +
        '<pre>' + escapeHtml(r.processed_text || r.raw_text || '') + '</pre>' +
        tagsHtml +
      '</div></div>';

    card.querySelector('.card-head').addEventListener('click', () => card.classList.toggle('open'));
    return card;
  }

  // ---- Todos ----
  async function loadTodos() {
    const c = getCfg();
    if (!c.url) return;
    try {
      const data = await apiGet({ action: 'todos', done: 'false' });
      if (!data.success) return;
      renderTodos(data.todos || []);
    } catch (e) { /* ignore */ }
  }
  function renderTodos(todos) {
    $('todoCount').textContent = todos.length;
    const wrap = $('todos');
    if (!todos.length) { wrap.innerHTML = '<div style="color:var(--text-dim);font-size:13px;">目前沒有未完成待辦。</div>'; return; }
    wrap.innerHTML = '';
    todos.forEach((t) => {
      const el = document.createElement('div');
      el.className = 'todo';
      const meta = [t.assignee, t.due_hint].filter(Boolean).join(' · ');
      el.innerHTML =
        '<span class="check"></span>' +
        '<div><div class="todo-text">' + escapeHtml(t.content) + '</div>' +
        (meta ? '<div class="todo-meta">' + escapeHtml(meta) + '</div>' : '') + '</div>';
      el.querySelector('.check').addEventListener('click', async () => {
        el.classList.add('done');
        try {
          const res = await apiPost({ action: 'todo_done', id: t.id, done: true });
          if (!res.success) throw new Error(res.error);
          showToast('✓ 已完成');
          setTimeout(loadTodos, 400);
        } catch (err) {
          el.classList.remove('done');
          showToast('✗ 更新失敗');
        }
      });
      wrap.appendChild(el);
    });
  }

  // ---- Search (debounced) ----
  let searchTimer = null;
  $('searchBox').addEventListener('input', (e) => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => { query = e.target.value.trim(); reload(); }, 500);
  });

  // ---- Helpers ----
  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
  }
  function formatTime(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    if (isNaN(d.getTime())) return String(iso);
    const diff = (Date.now() - d.getTime()) / 1000;
    if (diff < 60) return '剛剛';
    if (diff < 3600) return Math.floor(diff / 60) + ' 分鐘前';
    if (diff < 86400) return Math.floor(diff / 3600) + ' 小時前';
    const pad = (n) => String(n).padStart(2, '0');
    return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
  }
  function showToast(msg) {
    const t = $('toast'); t.textContent = msg; t.classList.add('show');
    clearTimeout(showToast._t); showToast._t = setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ---- Wire up ----
  $('btnSettings').addEventListener('click', openSettings);
  $('settingsModal').addEventListener('click', (e) => { if (e.target.id === 'settingsModal') e.currentTarget.classList.remove('open'); });
  $('btnSaveSettings').addEventListener('click', saveSettings);
  $('btnMore').addEventListener('click', loadMore);

  async function init() {
    if (!getCfg().url) { openSettings(); return; }
    await loadCategories();
    await reload();
    await loadTodos();
  }
  init();
})();
</script>
</body>
</html>
